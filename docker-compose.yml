services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - media-data:/app/media/files
      - db-data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/hang.db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis-data:/data

volumes:
  db-data:
  media-data:
  redis-data:
