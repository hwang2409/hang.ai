<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <div class="header">
    <div class="logo">N</div>
    <span class="title">Related Notes</span>
    <button id="close-btn" class="close-btn">&times;</button>
  </div>

  <div id="loading" class="loading">
    <div class="spinner"></div>
  </div>

  <div id="content" class="content hidden">
    <div id="page-info" class="page-info"></div>
    <div id="results"></div>
  </div>

  <div id="no-auth" class="message hidden">
    <p>Not logged in.</p>
    <p class="hint">Click the Neuronic extension icon to connect.</p>
  </div>

  <div id="no-results" class="message hidden">
    <p>No related notes found.</p>
    <p class="hint">Clip this page to start building connections.</p>
  </div>

  <script src="sidebar.js"></script>
</body>
</html>
